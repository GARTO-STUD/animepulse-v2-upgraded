# AnimePulse — Cloudflare Pages Configuration
name = "animepulse"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ── KV Namespace ─────────────────────────────────────────────
# Create with: wrangler kv:namespace create ANIMEPULSE_KV
# Then replace the id below with the real one
[[kv_namespaces]]
binding = "ANIMEPULSE_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# ── Secrets (set via: wrangler secret put SECRET_NAME) ───────
# wrangler secret put CRON_SECRET
# wrangler secret put GEMINI_API_KEY
# wrangler secret put FIREBASE_SERVICE_ACCOUNT_KEY
# wrangler secret put TELEGRAM_BOT_TOKEN       (optional)
# wrangler secret put TELEGRAM_CHANNEL_ID      (optional)

# ── Cron Trigger (Auto-Pilot) ─────────────────────────────────

